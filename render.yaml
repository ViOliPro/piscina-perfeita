# ============================================================
#  PiscinaPerfeita — Render Blueprint
#
#  Diferente do docker-compose.yml (feito pra um VPS/servidor genérico),
#  este arquivo descreve os serviços do jeito nativo do Render:
#  - Postgres gerenciado (sem container "db" próprio)
#  - API como Web Service (usa o Dockerfile existente)
#  - Front como Static Site (build estático, servido pelo CDN do Render
#    — mais simples e mais barato que rodar Nginx em container aqui)
#
#  O Render já entrega HTTPS automático pra tudo (onrender.com e domínio
#  próprio) — por isso NÃO existe Caddy nem docker-compose neste arquivo.
#
#  Como usar:
#    1. Dashboard do Render → New → Blueprint → conecte este repositório.
#    2. Render lê este arquivo e te pede pra confirmar os valores com
#       "sync: false" abaixo (ADMIN_EMAIL, ADMIN_PASSWORD etc.).
#    3. Depois do primeiro deploy, confira se as URLs públicas geradas
#       batem com "piscina-perfeita-api.onrender.com" e
#       "piscina-perfeita-front.onrender.com" (ver nota mais abaixo).
#       Se o Render tiver adicionado um sufixo (nome já em uso por outra
#       conta), ajuste CORS_ALLOWED_ORIGINS e VITE_API_BASE_URL abaixo
#       e re-sincronize o Blueprint.
# ============================================================

# ============================================================
#   PiscinaPerfeita — Render Blueprint
# ============================================================

databases:
  - name: piscina-perfeita-db
    databaseName: piscina_perfeita
    user: piscina
    plan: free # troque para "starter" (ou maior) antes de ter usuários reais

services:
  # ------------------------------------------------------------
  # API (.NET) — Web Service via Docker
  # ------------------------------------------------------------
  - type: web
    name: piscina-perfeita-api
    runtime: docker
    dockerContext: ./PiscinaPerfeita.Api/src
    dockerfilePath: ./PiscinaPerfeita.Api/src/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      # Monta a Connection String diretamente usando as propriedades nativas do banco do Render
      - key: ConnectionStrings__DefaultConnection
        value: "Host=${piscina-perfeita-db.host};Port=${piscina-perfeita-db.port};Database=${piscina-perfeita-db.database};Username=${piscina-perfeita-db.user};Password=${piscina-perfeita-db.password}"

      - key: Jwt__Key
        generateValue: true # Render gera uma chave segura de forma aleatória
      - key: Jwt__Issuer
        value: PiscinaPerfeita
      - key: Jwt__Audience
        value: PiscinaPerfeita

      # Usuário SuperAdmin (configuração inicial)
      - key: ADMIN_NAME
        value: Admin
      - key: ADMIN_EMAIL
        value: ""
        sync: false # Render solicita este valor no painel durante o primeiro sync
      - key: ADMIN_PASSWORD
        value: ""
        sync: false
      - key: ADMIN_CPF
        value: ""

      - key: Cors__AllowedOrigins
        value: "https://piscina-perfeita-front.onrender.com"

  # ------------------------------------------------------------
  # Front (React/Vite) — Static Site (Distribuído via CDN global)
  # ------------------------------------------------------------
  - type: web
    runtime: static
    name: piscina-perfeita-front
    plan: free # Sites estáticos são 100% gratuitos no Render
    rootDir: ./PiscinaPerfeita.Front
    buildCommand: yarn install --frozen-lockfile && yarn build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://piscina-perfeita-api.onrender.com/api"
    routes:
      # SPA fallback para evitar erros de 404 ao atualizar páginas internas (F5)
      - type: rewrite
        source: /*
        destination: /index.html
