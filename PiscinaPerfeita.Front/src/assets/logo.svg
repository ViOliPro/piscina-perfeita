<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" fill="none">
  <defs>
    <linearGradient id="waveGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5BC0EB"/>
      <stop offset="100%" stop-color="#2E86AB"/>
    </linearGradient>
    <linearGradient id="dropGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5BC0EB"/>
      <stop offset="100%" stop-color="#1E3A5F"/>
    </linearGradient>
    <clipPath id="iconClip">
      <rect x="0" y="0" width="56" height="60" rx="14"/>
    </clipPath>
  </defs>

  <!-- ── Ícone (fundo arredondado) ── -->
  <rect x="0" y="4" width="52" height="52" rx="13" fill="#0A1628"/>

  <!-- Gota d'água centralizada -->
  <path d="M26 13 C26 13 15 27 15 34 C15 40.6 20 46 26 46 C32 46 37 40.6 37 34 C37 27 26 13 26 13 Z"
        fill="url(#dropGrad)" opacity="0.9"/>

  <!-- Ondas internas na gota -->
  <path d="M18 35 C20 32 23 33 26 35 C29 37 32 36 34 33"
        stroke="#fff" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M19 39 C21.5 36.5 24 37.5 26 39.5 C28 41.5 30.5 40.5 33 38"
        stroke="#fff" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.45"/>

  <!-- Brilho na gota -->
  <ellipse cx="21" cy="24" rx="2.5" ry="4" fill="#fff" opacity="0.25" transform="rotate(-20 21 24)"/>

  <!-- ── Wordmark ── -->
  <!-- "Piscina" -->
  <text x="62" y="27"
        font-family="Inter, system-ui, sans-serif"
        font-size="17" font-weight="700" letter-spacing="-0.3"
        fill="#0A1628">Piscina</text>

  <!-- "Perfeita" — em azul água -->
  <text x="62" y="47"
        font-family="Inter, system-ui, sans-serif"
        font-size="17" font-weight="700" letter-spacing="-0.3"
        fill="#2E86AB">Perfeita</text>

  <!-- Sublinhado decorativo sob "Perfeita" -->
  <line x1="62" y1="51" x2="148" y2="51"
        stroke="url(#waveGrad)" stroke-width="2" stroke-linecap="round"/>

  <!-- Ondinha decorativa à direita do wordmark -->
  <path d="M156 30 C160 24 164 36 168 30 C172 24 176 36 180 30"
        stroke="#5BC0EB" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M156 38 C160 32 164 44 168 38 C172 32 176 44 180 38"
        stroke="#2E86AB" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.4"/>
</svg>
