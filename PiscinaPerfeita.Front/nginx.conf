# ============================================================
#  PiscinaPerfeita.Front — Nginx (produção)
#
#  - Serve o build estático do Vite (SPA) com fallback para index.html.
#  - Faz proxy de /api/* para o container da API (mesmo padrão do proxy
#    de desenvolvimento em vite.config.js), evitando problemas de CORS e
#    mantendo o front e a API sob a mesma origem no navegador.
# ============================================================
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Assets do Vite têm hash no nome do arquivo — podem ser cacheados
    # de forma agressiva, pois um novo build gera um nome novo.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html nunca deve ser cacheado, senão o usuário fica preso numa
    # versão antiga do app mesmo após um novo deploy.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Proxy reverso para a API — ajuste "api:10000" se o nome do serviço
    # ou a porta forem diferentes no seu docker-compose.yml.
    location /api/ {
        proxy_pass http://api:10000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://api:10000/health;
        proxy_set_header Host $host;
    }

    # SPA: qualquer rota que não seja um arquivo existente cai no index.html
    # (necessário para o roteamento do React funcionar em refresh/deep-link).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
